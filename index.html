<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>2048 Master</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f0f1e 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: "Space Grotesk", sans-serif;
            position: relative;
            overflow: hidden;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
        }

        body::before {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, transparent 70%);
            top: -200px;
            right: -200px;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: absolute;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.1) 0%, transparent 70%);
            bottom: -300px;
            left: -300px;
            pointer-events: none;
        }

        .score-container {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            z-index: 1;
        }

        .score-box {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 16px 32px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .score-label {
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .score-value {
            color: #fff;
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -1px;
        }

        #game-container {
            position: relative;
            width: 480px;
            height: 480px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            padding: 16px;
            border-radius: 24px;
            box-sizing: border-box;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 
                0 20px 60px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            z-index: 1;
            touch-action: none;
        }

        @media (max-width: 600px) {
            #game-container {
                width: 90vw;
                height: 90vw;
                max-width: 480px;
                max-height: 480px;
            }

            .tile {
                font-size: 8vw;
            }

            .tile[data-value="128"],
            .tile[data-value="256"],
            .tile[data-value="512"] {
                font-size: 7vw;
            }

            .tile[data-value="1024"],
            .tile[data-value="2048"] {
                font-size: 6vw;
            }

            .score-container {
                margin-bottom: 20px;
            }

            .score-box {
                padding: 12px 24px;
            }

            .score-value {
                font-size: 24px;
            }
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 16px;
            width: 100%;
            height: 100%;
        }

        .grid-cell {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .tile {
            position: absolute;
            width: 102px;
            height: 102px;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 42px;
            font-weight: 700;
            color: #fff;
            transition: all 0.15s cubic-bezier(0.4, 0.0, 0.2, 1);
            z-index: 10;
            pointer-events: none;
            box-shadow: 
                0 4px 20px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            letter-spacing: -2px;
        }

        .tile[data-value="2"] {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            box-shadow: 
                0 4px 20px rgba(102, 126, 234, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        .tile[data-value="4"] {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            box-shadow: 
                0 4px 20px rgba(240, 147, 251, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        .tile[data-value="8"] {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            box-shadow: 
                0 4px 20px rgba(79, 172, 254, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        .tile[data-value="16"] {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            box-shadow: 
                0 4px 20px rgba(67, 233, 123, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        .tile[data-value="32"] {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            box-shadow: 
                0 4px 20px rgba(250, 112, 154, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        .tile[data-value="64"] {
            background: linear-gradient(135deg, #30cfd0 0%, #330867 100%);
            box-shadow: 
                0 4px 20px rgba(48, 207, 208, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        .tile[data-value="128"] {
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            font-size: 36px;
            box-shadow: 
                0 6px 30px rgba(168, 237, 234, 0.6),
                inset 0 1px 0 rgba(255, 255, 255, 0.3);
            animation: glow 2s ease-in-out infinite;
        }

        .tile[data-value="256"] {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            font-size: 36px;
            box-shadow: 
                0 6px 30px rgba(255, 154, 158, 0.6),
                inset 0 1px 0 rgba(255, 255, 255, 0.3);
            animation: glow 2s ease-in-out infinite;
        }

        .tile[data-value="512"] {
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            font-size: 36px;
            box-shadow: 
                0 6px 30px rgba(255, 236, 210, 0.6),
                inset 0 1px 0 rgba(255, 255, 255, 0.3);
            animation: glow 2s ease-in-out infinite;
        }

        .tile[data-value="1024"] {
            background: linear-gradient(135deg, #ff0844 0%, #ffb199 100%);
            font-size: 32px;
            box-shadow: 
                0 8px 40px rgba(255, 8, 68, 0.7),
                inset 0 1px 0 rgba(255, 255, 255, 0.3);
            animation: glow 1.5s ease-in-out infinite;
        }

        .tile[data-value="2048"] {
            background: linear-gradient(135deg, #fddb92 0%, #d1fdff 100%);
            font-size: 32px;
            box-shadow: 
                0 8px 40px rgba(253, 219, 146, 0.8),
                0 0 60px rgba(253, 219, 146, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.4);
            animation: glow 1s ease-in-out infinite, rainbow 3s linear infinite;
        }

        @keyframes glow {
            0%, 100% {
                box-shadow: 
                    0 6px 30px rgba(255, 255, 255, 0.3),
                    inset 0 1px 0 rgba(255, 255, 255, 0.3);
            }
            50% {
                box-shadow: 
                    0 8px 40px rgba(255, 255, 255, 0.5),
                    inset 0 1px 0 rgba(255, 255, 255, 0.4);
            }
        }

        @keyframes rainbow {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }

        @keyframes pop {
            0% {
                transform: scale(0);
                opacity: 0;
            }
            50% {
                transform: scale(1.1);
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .tile.new {
            animation: pop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes merge {
            0% {
                transform: scale(1);
                filter: brightness(1);
            }
            50% {
                transform: scale(1.2);
                filter: brightness(1.5);
            }
            100% {
                transform: scale(1);
                filter: brightness(1);
            }
        }

        .tile.merged {
            animation: merge 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .tile.merged-from {
            transition: all 0.15s cubic-bezier(0.4, 0.0, 0.2, 1), opacity 0.15s ease-out !important;
            opacity: 0;
        }

        #game-over-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: fadeIn 0.3s ease-out;
        }

        #game-over-overlay.show {
            display: flex;
        }

        .game-over-content {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 48px 64px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .game-over-title {
            color: #fff;
            font-size: 56px;
            font-weight: 700;
            margin-bottom: 16px;
            letter-spacing: -1px;
        }

        .game-over-score {
            color: rgba(255, 255, 255, 0.7);
            font-size: 18px;
            margin-bottom: 32px;
            letter-spacing: 1px;
        }

        .restart-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 12px;
            padding: 16px 48px;
            color: #fff;
            font-family: "Space Grotesk", sans-serif;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.4);
            transition: all 0.2s ease;
        }

        .restart-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(102, 126, 234, 0.6);
        }

        .restart-btn:active {
            transform: translateY(0);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <div class="score-container">
        <div class="score-box">
            <div class="score-label">Score</div>
            <div class="score-value" id="current-score">0</div>
        </div>
        <div class="score-box">
            <div class="score-label">Best</div>
            <div class="score-value" id="best-score">0</div>
        </div>
    </div>
    <div id="game-container">
        <div class="grid-container" id="grid-bg"></div>
    </div>

    <div id="game-over-overlay">
        <div class="game-over-content">
            <div class="game-over-title">GAME OVER</div>
            <div class="game-over-score">최종 점수: <span id="final-score">0</span></div>
            <button class="restart-btn" onclick="restart()">다시 시작</button>
        </div>
    </div>

    <script>
        const gameContainer = document.getElementById('game-container');
        const scoreDisplay = document.getElementById('current-score');
        const bestScoreDisplay = document.getElementById('best-score');
        const gameOverOverlay = document.getElementById('game-over-overlay');
        const finalScoreDisplay = document.getElementById('final-score');
        let board = [];
        let score = 0;
        let bestScore = parseInt(localStorage.getItem('bestScore')) || 0;
        let tileIdCounter = 0;
        let gameOver = false;

        function init() {
            board = Array.from({ length: 4 }, () => Array(4).fill(null));
            score = 0;
            gameOver = false;
            gameOverOverlay.classList.remove('show');
            
            const bg = document.getElementById('grid-bg');
            bg.innerHTML = '';
            for (let i = 0; i < 16; i++) {
                const cell = document.createElement('div');
                cell.classList.add('grid-cell');
                bg.appendChild(cell);
            }
            bestScoreDisplay.innerText = bestScore;
            generate(); 
            generate();
            render();
        }

        function restart() {
            // 모든 타일 제거
            document.querySelectorAll('.tile').forEach(el => el.remove());
            init();
        }

        function getPos(pos) { return 16 + (pos * 118); }

        function render() {
            scoreDisplay.innerText = score;
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('bestScore', bestScore);
                bestScoreDisplay.innerText = bestScore;
            }
            
            const currentTileElements = document.querySelectorAll('.tile');
            const aliveIds = new Set();

            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 4; j++) {
                    const tileData = board[i][j];
                    if (tileData) {
                        aliveIds.add(tileData.id.toString());
                        let tileEl = document.querySelector(`.tile[data-id="${tileData.id}"]`);

                        const isNew = !tileEl;
                        const isActuallyNew = isNew && tileData.previousRow === undefined;
                        
                        if (!tileEl) {
                            tileEl = document.createElement('div');
                            tileEl.classList.add('tile');
                            tileEl.dataset.id = tileData.id;
                            gameContainer.appendChild(tileEl);
                            
                            // 새 타일은 이전 위치가 현재 위치와 같음
                            if (tileData.previousRow === undefined) {
                                tileData.previousRow = i;
                                tileData.previousCol = j;
                            }
                        }

                        // 이전 위치에서 시작
                        const prevRow = tileData.previousRow !== undefined ? tileData.previousRow : i;
                        const prevCol = tileData.previousCol !== undefined ? tileData.previousCol : j;
                        
                        if (isNew) {
                            tileEl.style.top = getPos(prevRow) + 'px';
                            tileEl.style.left = getPos(prevCol) + 'px';
                        }

                        // 다음 프레임에서 이동
                        requestAnimationFrame(() => {
                            tileEl.style.top = getPos(i) + 'px';
                            tileEl.style.left = getPos(j) + 'px';
                            tileEl.innerText = tileData.value;
                            tileEl.setAttribute('data-value', tileData.value);
                            tileEl.style.zIndex = tileData.value;
                            
                            // generate()로 새로 생성된 타일만 new 애니메이션
                            if (isActuallyNew) {
                                tileEl.classList.add('new');
                            }
                            
                            // 합쳐진 타일은 merged 애니메이션만
                            if (tileData.mergedFrom) {
                                tileEl.classList.add('merged');
                                setTimeout(() => tileEl.classList.remove('merged'), 250);
                                delete tileData.mergedFrom;
                            }
                        });
                    }
                }
            }

            // 사라진 타일들 처리
            currentTileElements.forEach(el => {
                if (!aliveIds.has(el.dataset.id)) {
                    el.classList.add('merged-from');
                    setTimeout(() => el.remove(), 150);
                }
            });
        }

        function generate() {
            let empty = [];
            for (let i = 0; i < 4; i++)
                for (let j = 0; j < 4; j++)
                    if (!board[i][j]) empty.push({ r: i, c: j });

            if (empty.length > 0) {
                let { r, c } = empty[Math.floor(Math.random() * empty.length)];
                board[r][c] = { 
                    value: 2, 
                    id: tileIdCounter++,
                    previousRow: r,
                    previousCol: c
                };
            }
        }

        function slide(row, rowIndex, isVertical) {
            let newRow = row.filter(v => v !== null);
            let merged = [];
            
            for (let i = 0; i < newRow.length - 1; i++) {
                if (newRow[i].value === newRow[i + 1].value) {
                    newRow[i] = { 
                        value: newRow[i].value * 2, 
                        id: newRow[i].id,
                        mergedFrom: [newRow[i].id, newRow[i + 1].id]
                    };
                    score += newRow[i].value;
                    merged.push(newRow[i + 1].id);
                    newRow.splice(i + 1, 1);
                }
            }
            
            while (newRow.length < 4) newRow.push(null);
            return newRow;
        }

        function savePositions() {
            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 4; j++) {
                    if (board[i][j]) {
                        board[i][j].previousRow = i;
                        board[i][j].previousCol = j;
                    }
                }
            }
        }

        function move(dir) {
            let oldBoard = JSON.stringify(board);
            
            // 이동 전 위치 저장
            savePositions();

            if (dir === 'Left' || dir === 'Right') {
                for (let i = 0; i < 4; i++) {
                    if (dir === 'Right') board[i].reverse();
                    board[i] = slide(board[i], i, false);
                    if (dir === 'Right') board[i].reverse();
                }
            } else {
                board = rotate(board);
                for (let i = 0; i < 4; i++) {
                    if (dir === 'Down') board[i].reverse();
                    board[i] = slide(board[i], i, true);
                    if (dir === 'Down') board[i].reverse();
                }
                board = rotate(board);
            }

            if (oldBoard !== JSON.stringify(board)) {
                render();

                setTimeout(() => {
                    generate();
                    render();

                    if (checkGameOver()) {
                        gameOver = true;
                        setTimeout(() => {
                            finalScoreDisplay.innerText = score;
                            gameOverOverlay.classList.add('show');
                        }, 300);
                    }
                }, 180);
            }
        }

        function rotate(m) { 
            const rotated = m[0].map((_, i) => m.map(row => row[i]));
            // 회전 후 previousPosition도 같이 변환
            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 4; j++) {
                    if (rotated[i][j] && rotated[i][j].previousRow !== undefined) {
                        const oldPrevRow = rotated[i][j].previousRow;
                        const oldPrevCol = rotated[i][j].previousCol;
                        rotated[i][j].previousRow = oldPrevCol;
                        rotated[i][j].previousCol = 3 - oldPrevRow;
                    }
                }
            }
            return rotated;
        }

        function checkGameOver() {
            for (let i = 0; i < 4; i++)
                for (let j = 0; j < 4; j++)
                    if (board[i][j] === null) return false;

            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 4; j++) {
                    if (j < 3 && board[i][j].value === board[i][j + 1].value) return false;
                    if (i < 3 && board[i][j].value === board[i + 1][j].value) return false;
                }
            }
            return true;
        }

        window.addEventListener('keydown', e => {
            if (gameOver) return;
            if (e.key.includes('Arrow')) {
                e.preventDefault();
                move(e.key.replace('Arrow', ''));
            }
        });

        // 모바일 터치 지원
        let touchStartX = 0;
        let touchStartY = 0;
        let touchEndX = 0;
        let touchEndY = 0;

        gameContainer.addEventListener('touchstart', e => {
            if (gameOver) return;
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
        }, { passive: true });

        gameContainer.addEventListener('touchend', e => {
            if (gameOver) return;
            touchEndX = e.changedTouches[0].screenX;
            touchEndY = e.changedTouches[0].screenY;
            handleSwipe();
        }, { passive: true });

        function handleSwipe() {
            const deltaX = touchEndX - touchStartX;
            const deltaY = touchEndY - touchStartY;
            const minSwipeDistance = 30;

            // 수평/수직 중 더 큰 움직임 판단
            if (Math.abs(deltaX) < minSwipeDistance && Math.abs(deltaY) < minSwipeDistance) {
                return; // 너무 짧은 스와이프 무시
            }

            if (Math.abs(deltaX) > Math.abs(deltaY)) {
                // 수평 스와이프
                if (deltaX > 0) {
                    move('Right');
                } else {
                    move('Left');
                }
            } else {
                // 수직 스와이프
                if (deltaY > 0) {
                    move('Down');
                } else {
                    move('Up');
                }
            }
        }

        init();
    </script>
</body>

</html>
