<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>2048 Master</title>
    <link rel="manifest" href="manifest.webmanifest">
    <meta name="theme-color" content="#667eea">
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <link rel="apple-touch-icon" href="icon.svg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="2048">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f0f1e 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: "Space Grotesk", sans-serif;
            position: relative;
            overflow: hidden;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
        }

        body::before {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, transparent 70%);
            top: -200px;
            right: -200px;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: absolute;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.1) 0%, transparent 70%);
            bottom: -300px;
            left: -300px;
            pointer-events: none;
        }

        .score-container {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            z-index: 1;
        }

        .score-box {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 16px 32px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .score-label {
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .score-value {
            color: #fff;
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -1px;
        }

        #game-container {
            position: relative;
            width: 480px;
            height: 480px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            padding: 16px;
            border-radius: 24px;
            box-sizing: border-box;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 
                0 20px 60px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            z-index: 1;
            touch-action: none;
        }

        @media (max-width: 600px) {
            #game-container {
                width: 90vw;
                height: 90vw;
                max-width: 480px;
                max-height: 480px;
            }

            .tile {
                font-size: 8vw;
            }

            .tile[data-value="128"],
            .tile[data-value="256"],
            .tile[data-value="512"] {
                font-size: 7vw;
            }

            .tile[data-value="1024"],
            .tile[data-value="2048"] {
                font-size: 6vw;
            }

            .score-container {
                margin-bottom: 20px;
            }

            .score-box {
                padding: 12px 24px;
            }

            .score-value {
                font-size: 24px;
            }
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 16px;
            width: 100%;
            height: 100%;
        }

        .grid-cell {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .tile {
            position: absolute;
            width: 102px;
            height: 102px;
            border-radius: 12px;
            will-change: transform, top, left;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 42px;
            font-weight: 700;
            color: #fff;
            transition: all 0.15s cubic-bezier(0.4, 0.0, 0.2, 1);
            z-index: 10;
            pointer-events: none;
            box-shadow: 
                0 4px 20px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            letter-spacing: -2px;
        }

        .tile[data-value="2"] {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            box-shadow: 
                0 4px 20px rgba(102, 126, 234, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        .tile[data-value="4"] {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            box-shadow: 
                0 4px 20px rgba(240, 147, 251, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        .tile[data-value="8"] {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            box-shadow: 
                0 4px 20px rgba(79, 172, 254, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        .tile[data-value="16"] {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            box-shadow: 
                0 4px 20px rgba(67, 233, 123, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        .tile[data-value="32"] {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            box-shadow: 
                0 4px 20px rgba(250, 112, 154, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        .tile[data-value="64"] {
            background: linear-gradient(135deg, #30cfd0 0%, #330867 100%);
            box-shadow: 
                0 4px 20px rgba(48, 207, 208, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        .tile[data-value="128"] {
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            font-size: 36px;
            box-shadow: 
                0 6px 30px rgba(168, 237, 234, 0.6),
                inset 0 1px 0 rgba(255, 255, 255, 0.3);
            animation: glow 2s ease-in-out infinite;
        }

        .tile[data-value="256"] {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            font-size: 36px;
            box-shadow: 
                0 6px 30px rgba(255, 154, 158, 0.6),
                inset 0 1px 0 rgba(255, 255, 255, 0.3);
            animation: glow 2s ease-in-out infinite;
        }

        .tile[data-value="512"] {
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            font-size: 36px;
            box-shadow: 
                0 6px 30px rgba(255, 236, 210, 0.6),
                inset 0 1px 0 rgba(255, 255, 255, 0.3);
            animation: glow 2s ease-in-out infinite;
        }

        .tile[data-value="1024"] {
            background: linear-gradient(135deg, #ff0844 0%, #ffb199 100%);
            font-size: 32px;
            box-shadow: 
                0 8px 40px rgba(255, 8, 68, 0.7),
                inset 0 1px 0 rgba(255, 255, 255, 0.3);
            animation: glow 1.5s ease-in-out infinite;
        }

        .tile[data-value="2048"] {
            background: linear-gradient(135deg, #fddb92 0%, #d1fdff 100%);
            font-size: 32px;
            box-shadow: 
                0 8px 40px rgba(253, 219, 146, 0.8),
                0 0 60px rgba(253, 219, 146, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.4);
            animation: glow 1s ease-in-out infinite, rainbow 3s linear infinite;
        }

        @keyframes glow {
            0%, 100% {
                box-shadow: 
                    0 6px 30px rgba(255, 255, 255, 0.3),
                    inset 0 1px 0 rgba(255, 255, 255, 0.3);
            }
            50% {
                box-shadow: 
                    0 8px 40px rgba(255, 255, 255, 0.5),
                    inset 0 1px 0 rgba(255, 255, 255, 0.4);
            }
        }

        @keyframes rainbow {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }

        @keyframes pop {
            0% {
                transform: scale(0);
                opacity: 0;
            }
            50% {
                transform: scale(1.1);
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .tile.new {
            animation: pop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes merge {
            0% {
                transform: scale(1);
                filter: brightness(1);
            }
            50% {
                transform: scale(1.2);
                filter: brightness(1.5);
            }
            100% {
                transform: scale(1);
                filter: brightness(1);
            }
        }

        .tile.merged {
            animation: merge 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .tile.merged-from {
            transition: all 0.15s cubic-bezier(0.4, 0.0, 0.2, 1), opacity 0.15s ease-out !important;
            opacity: 0;
        }

        #game-over-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: fadeIn 0.3s ease-out;
        }

        #game-over-overlay.show {
            display: flex;
        }

        .game-over-content {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 48px 64px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .game-over-title {
            color: #fff;
            font-size: 56px;
            font-weight: 700;
            margin-bottom: 16px;
            letter-spacing: -1px;
        }

        .game-over-score {
            color: rgba(255, 255, 255, 0.7);
            font-size: 18px;
            margin-bottom: 32px;
            letter-spacing: 1px;
        }

        .restart-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 12px;
            padding: 16px 48px;
            color: #fff;
            font-family: "Space Grotesk", sans-serif;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.4);
            transition: all 0.2s ease;
        }

        .restart-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(102, 126, 234, 0.6);
        }

        .restart-btn:active {
            transform: translateY(0);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        /* 작업 3: 리더보드 UI */
        .ranking-btn {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 16px 24px;
            color: #fff;
            font-family: "Space Grotesk", sans-serif;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: all 0.2s ease;
        }
        .ranking-btn:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.08);
        }

        .submit-form {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .submit-form[hidden] { display: none; }

        #nickname-input {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            padding: 12px 16px;
            color: #fff;
            font-family: "Space Grotesk", sans-serif;
            font-size: 16px;
            width: 200px;
            outline: none;
            transition: border-color 0.2s ease;
        }
        #nickname-input:focus {
            border-color: rgba(102, 126, 234, 0.6);
        }
        #nickname-input:disabled { opacity: 0.6; }

        .submit-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 12px;
            padding: 12px 20px;
            color: #fff;
            font-family: "Space Grotesk", sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.4);
            transition: all 0.2s ease;
        }
        .submit-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(102, 126, 234, 0.6);
        }
        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .lb-error {
            color: #ff8a8a;
            font-size: 14px;
            margin-bottom: 12px;
            min-height: 0;
        }
        .lb-error[hidden] { display: none; }

        .lb-section[hidden] { display: none; }

        .lb-title {
            color: rgba(255, 255, 255, 0.85);
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        .leaderboard-list {
            list-style: none;
            margin: 0 0 24px;
            padding: 0;
            text-align: left;
            max-height: 280px;
            overflow-y: auto;
        }
        .leaderboard-list li {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            border-radius: 8px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            margin-bottom: 4px;
            background: rgba(255, 255, 255, 0.03);
        }
        .leaderboard-list li.me {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.35) 0%, rgba(118, 75, 162, 0.35) 100%);
            color: #fff;
            font-weight: 600;
        }
        .leaderboard-list .rank { width: 28px; opacity: 0.7; }
        .leaderboard-list .nick { flex: 1; padding: 0 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .leaderboard-list .sc { font-variant-numeric: tabular-nums; font-weight: 600; }

        #leaderboard-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: fadeIn 0.3s ease-out;
        }
        #leaderboard-overlay.show { display: flex; }

        .lb-content {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 32px 40px;
            text-align: center;
            min-width: 360px;
            max-width: 90vw;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        @media (max-width: 600px) {
            .ranking-btn { padding: 12px 18px; font-size: 12px; }
            #nickname-input { width: 160px; font-size: 14px; }
            .game-over-content { padding: 32px 24px; }
            .lb-content { padding: 24px 20px; min-width: 280px; }
            .game-over-title { font-size: 40px; }
        }
    </style>
</head>

<body>
    <div class="score-container">
        <div class="score-box">
            <div class="score-label">Score</div>
            <div class="score-value" id="current-score">0</div>
        </div>
        <div class="score-box">
            <div class="score-label">Best</div>
            <div class="score-value" id="best-score">0</div>
        </div>
        <button class="ranking-btn" id="ranking-btn" type="button">🏆 랭킹</button>
        <button class="ranking-btn" id="install-btn" type="button" hidden>📥 설치</button>
    </div>
    <div id="game-container">
        <div class="grid-container" id="grid-bg"></div>
    </div>

    <div id="game-over-overlay">
        <div class="game-over-content">
            <div class="game-over-title">GAME OVER</div>
            <div class="game-over-score">최종 점수: <span id="final-score">0</span></div>

            <form class="submit-form" id="submit-form" onsubmit="event.preventDefault(); handleSubmitScore();">
                <input type="text" id="nickname-input" maxlength="12" placeholder="닉네임 (1~12자)" autocomplete="off" />
                <button class="submit-btn" id="submit-btn" type="submit">점수 제출</button>
            </form>

            <div class="lb-error" id="lb-error" hidden></div>

            <div class="lb-section" id="leaderboard-section" hidden>
                <div class="lb-title">리더보드 TOP 10</div>
                <ol class="leaderboard-list" id="leaderboard-list"></ol>
            </div>

            <button class="restart-btn" onclick="restart()">다시 시작</button>
        </div>
    </div>

    <div id="leaderboard-overlay">
        <div class="lb-content">
            <div class="lb-title">리더보드 TOP 10</div>
            <ol class="leaderboard-list" id="lb-only-list"></ol>
            <button class="restart-btn" id="lb-close" type="button">닫기</button>
        </div>
    </div>

    <script>
        const gameContainer = document.getElementById('game-container');
        const scoreDisplay = document.getElementById('current-score');
        const bestScoreDisplay = document.getElementById('best-score');
        const gameOverOverlay = document.getElementById('game-over-overlay');
        const finalScoreDisplay = document.getElementById('final-score');
        const restartBtn = document.querySelector('.restart-btn');
        let board = [];
        let score = 0;
        let bestScore = parseInt(localStorage.getItem('bestScore')) || 0;
        let tileIdCounter = 0;
        let gameOver = false;

        // 1A: 셀 측정 캐시 (모바일/리사이즈 대응)
        let gridMetrics = { tileSize: 102, stepX: 118, stepY: 118, originX: 16, originY: 16 };

        function measureGrid() {
            const cells = document.querySelectorAll('#grid-bg .grid-cell');
            if (cells.length < 5) return;
            const containerRect = gameContainer.getBoundingClientRect();
            const r0 = cells[0].getBoundingClientRect();
            const r1 = cells[1].getBoundingClientRect();    // 같은 행, 다음 열
            const r4 = cells[4].getBoundingClientRect();    // 다음 행, 같은 열
            gridMetrics = {
                tileSize: r0.width,
                stepX: r1.left - r0.left,
                stepY: r4.top - r0.top,
                originX: r0.left - containerRect.left,
                originY: r0.top - containerRect.top,
            };
            // 모든 타일 크기 동기화
            document.querySelectorAll('.tile').forEach(el => {
                el.style.width = gridMetrics.tileSize + 'px';
                el.style.height = gridMetrics.tileSize + 'px';
            });
        }

        function getPosX(col) { return gridMetrics.originX + col * gridMetrics.stepX; }
        function getPosY(row) { return gridMetrics.originY + row * gridMetrics.stepY; }

        function init() {
            board = Array.from({ length: 4 }, () => Array(4).fill(null));
            score = 0;
            gameOver = false;
            gameOverOverlay.classList.remove('show');

            const bg = document.getElementById('grid-bg');
            bg.innerHTML = '';
            for (let i = 0; i < 16; i++) {
                const cell = document.createElement('div');
                cell.classList.add('grid-cell');
                bg.appendChild(cell);
            }
            bestScoreDisplay.innerText = bestScore;
            measureGrid();
            generate();
            generate();
            render();
        }

        function restart() {
            document.querySelectorAll('.tile').forEach(el => el.remove());
            init();
        }

        function updateScore() {
            scoreDisplay.innerText = score;
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('bestScore', bestScore);
                bestScoreDisplay.innerText = bestScore;
            }
        }

        function render() {
            updateScore();

            const currentTileElements = document.querySelectorAll('.tile');
            const aliveIds = new Set();

            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 4; j++) {
                    const tileData = board[i][j];
                    if (!tileData) continue;

                    aliveIds.add(tileData.id.toString());
                    let tileEl = document.querySelector(`.tile[data-id="${tileData.id}"]`);

                    const isNew = !tileEl;
                    const isActuallyNew = isNew && tileData.previousRow === undefined;

                    if (!tileEl) {
                        tileEl = document.createElement('div');
                        tileEl.classList.add('tile');
                        tileEl.dataset.id = tileData.id;
                        tileEl.style.width = gridMetrics.tileSize + 'px';
                        tileEl.style.height = gridMetrics.tileSize + 'px';
                        gameContainer.appendChild(tileEl);

                        if (tileData.previousRow === undefined) {
                            tileData.previousRow = i;
                            tileData.previousCol = j;
                        }
                    }

                    const prevRow = tileData.previousRow !== undefined ? tileData.previousRow : i;
                    const prevCol = tileData.previousCol !== undefined ? tileData.previousCol : j;

                    if (isNew) {
                        tileEl.style.top = getPosY(prevRow) + 'px';
                        tileEl.style.left = getPosX(prevCol) + 'px';
                    }

                    requestAnimationFrame(() => {
                        tileEl.style.top = getPosY(i) + 'px';
                        tileEl.style.left = getPosX(j) + 'px';
                        tileEl.innerText = tileData.value;
                        tileEl.setAttribute('data-value', tileData.value);
                        tileEl.style.zIndex = tileData.value;

                        if (isActuallyNew) {
                            tileEl.classList.add('new');
                        }

                        if (tileData.mergedFrom) {
                            tileEl.classList.add('merged');
                            setTimeout(() => tileEl.classList.remove('merged'), 250);
                            delete tileData.mergedFrom;
                        }
                    });
                }
            }

            currentTileElements.forEach(el => {
                if (!aliveIds.has(el.dataset.id)) {
                    el.classList.add('merged-from');
                    setTimeout(() => el.remove(), 150);
                }
            });
        }

        function generate() {
            let empty = [];
            for (let i = 0; i < 4; i++)
                for (let j = 0; j < 4; j++)
                    if (!board[i][j]) empty.push({ r: i, c: j });

            if (empty.length > 0) {
                let { r, c } = empty[Math.floor(Math.random() * empty.length)];
                board[r][c] = {
                    value: 2,
                    id: tileIdCounter++,
                    previousRow: r,
                    previousCol: c,
                };
            }
        }

        // 1B: moved 플래그를 반환해 JSON.stringify 비교 제거
        function slide(row) {
            let newRow = row.filter(v => v !== null);
            let moved = newRow.length !== row.length || newRow.some((t, idx) => row[idx] !== t);

            for (let i = 0; i < newRow.length - 1; i++) {
                if (newRow[i].value === newRow[i + 1].value) {
                    newRow[i] = {
                        value: newRow[i].value * 2,
                        id: newRow[i].id,
                        mergedFrom: [newRow[i].id, newRow[i + 1].id],
                    };
                    score += newRow[i].value;
                    updateScore(); // 1G: 머지 즉시 점수 반영
                    newRow.splice(i + 1, 1);
                    moved = true;
                }
            }

            while (newRow.length < 4) newRow.push(null);
            return { row: newRow, moved };
        }

        function savePositions() {
            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 4; j++) {
                    if (board[i][j]) {
                        board[i][j].previousRow = i;
                        board[i][j].previousCol = j;
                    }
                }
            }
        }

        function move(dir) {
            // USP 유지: 빠른 연타에도 입력을 즉시 처리. gameOver만 차단.
            if (gameOver) return;

            savePositions();
            let moved = false;

            if (dir === 'Left' || dir === 'Right') {
                for (let i = 0; i < 4; i++) {
                    if (dir === 'Right') board[i].reverse();
                    const result = slide(board[i]);
                    board[i] = result.row;
                    if (dir === 'Right') board[i].reverse();
                    if (result.moved) moved = true;
                }
            } else {
                board = rotate(board);
                for (let i = 0; i < 4; i++) {
                    if (dir === 'Down') board[i].reverse();
                    const result = slide(board[i]);
                    board[i] = result.row;
                    if (dir === 'Down') board[i].reverse();
                    if (result.moved) moved = true;
                }
                board = rotate(board);
            }

            if (!moved) return;

            render();

            setTimeout(() => {
                generate();
                render();

                if (checkGameOver()) {
                    gameOver = true;
                    setTimeout(showGameOverModal, 300);
                }
            }, 180);
        }

        // 1D: rotate에서 previousRow/Col을 변환하지 않음. render는 항상 원본 좌표계 기준.
        function rotate(m) {
            return m[0].map((_, i) => m.map(row => row[i]));
        }

        function checkGameOver() {
            for (let i = 0; i < 4; i++)
                for (let j = 0; j < 4; j++)
                    if (board[i][j] === null) return false;

            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 4; j++) {
                    if (j < 3 && board[i][j].value === board[i][j + 1].value) return false;
                    if (i < 3 && board[i][j].value === board[i + 1][j].value) return false;
                }
            }
            return true;
        }

        window.addEventListener('keydown', e => {
            if (gameOver) return;
            if (e.key.includes('Arrow')) {
                e.preventDefault();
                move(e.key.replace('Arrow', ''));
            }
        });

        // 1E: clientX/Y 사용 (멀티 모니터/줌 안정)
        let touchStartX = 0;
        let touchStartY = 0;
        let touchEndX = 0;
        let touchEndY = 0;

        gameContainer.addEventListener('touchstart', e => {
            if (gameOver) return;
            touchStartX = e.changedTouches[0].clientX;
            touchStartY = e.changedTouches[0].clientY;
        }, { passive: true });

        gameContainer.addEventListener('touchend', e => {
            if (gameOver) return;
            touchEndX = e.changedTouches[0].clientX;
            touchEndY = e.changedTouches[0].clientY;
            handleSwipe();
        }, { passive: true });

        function handleSwipe() {
            const deltaX = touchEndX - touchStartX;
            const deltaY = touchEndY - touchStartY;
            const minSwipeDistance = 30;

            if (Math.abs(deltaX) < minSwipeDistance && Math.abs(deltaY) < minSwipeDistance) return;

            if (Math.abs(deltaX) > Math.abs(deltaY)) {
                move(deltaX > 0 ? 'Right' : 'Left');
            } else {
                move(deltaY > 0 ? 'Down' : 'Up');
            }
        }

        // 1A: 리사이즈 시 그리드 메트릭 재측정 + 타일 위치 갱신
        let resizeTimer = null;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(() => {
                measureGrid();
                // 모든 타일을 현재 좌표로 재배치
                for (let i = 0; i < 4; i++) {
                    for (let j = 0; j < 4; j++) {
                        const t = board[i][j];
                        if (!t) continue;
                        const el = document.querySelector(`.tile[data-id="${t.id}"]`);
                        if (!el) continue;
                        el.style.top = getPosY(i) + 'px';
                        el.style.left = getPosX(j) + 'px';
                    }
                }
            }, 100);
        });

        // ============================
        // 작업 3: Supabase 리더보드
        // ============================
        const SUPABASE_URL = 'https://gtsvkpizhsyidmtoyoxv.supabase.co';
        const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd0c3ZrcGl6aHN5aWRtdG95b3h2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwOTE5OTIsImV4cCI6MjA5MjY2Nzk5Mn0.MKqCdTiswt9VTMvXhvJAL8E3heNZDWWDduDkyn5YFDI';
        const NICK_RE = /^[A-Za-z0-9가-힣 _\-]+$/;

        const submitForm = document.getElementById('submit-form');
        const nicknameInput = document.getElementById('nickname-input');
        const submitBtn = document.getElementById('submit-btn');
        const lbErrorEl = document.getElementById('lb-error');
        const lbSection = document.getElementById('leaderboard-section');
        const lbList = document.getElementById('leaderboard-list');
        const rankingBtn = document.getElementById('ranking-btn');
        const lbOverlay = document.getElementById('leaderboard-overlay');
        const lbOnlyList = document.getElementById('lb-only-list');
        const lbCloseBtn = document.getElementById('lb-close');

        async function submitScore(nickname, scoreVal) {
            const r = await fetch(`${SUPABASE_URL}/rest/v1/leaderboard`, {
                method: 'POST',
                headers: {
                    'apikey': SUPABASE_ANON,
                    'Authorization': `Bearer ${SUPABASE_ANON}`,
                    'Content-Type': 'application/json',
                    'Prefer': 'return=minimal',
                },
                body: JSON.stringify({ nickname, score: scoreVal }),
            });
            if (!r.ok) {
                let detail = '';
                try { detail = (await r.text()).slice(0, 200); } catch (_) {}
                throw new Error(`HTTP ${r.status} ${detail}`);
            }
        }

        async function fetchTop(limit = 10) {
            const url = `${SUPABASE_URL}/rest/v1/leaderboard?select=nickname,score,created_at&order=score.desc,created_at.asc&limit=${limit}`;
            const r = await fetch(url, {
                headers: {
                    'apikey': SUPABASE_ANON,
                    'Authorization': `Bearer ${SUPABASE_ANON}`,
                },
            });
            if (!r.ok) throw new Error(`HTTP ${r.status}`);
            return await r.json();
        }

        function renderLeaderboard(listEl, rows, highlight) {
            listEl.innerHTML = '';
            if (!rows || !rows.length) {
                const li = document.createElement('li');
                li.textContent = '아직 기록이 없습니다';
                listEl.appendChild(li);
                return;
            }
            rows.forEach((row, idx) => {
                const li = document.createElement('li');
                if (highlight && row.nickname === highlight.nickname && row.score === highlight.score) {
                    li.classList.add('me');
                }
                const rk = document.createElement('span'); rk.className = 'rank'; rk.textContent = (idx + 1) + '.';
                const nk = document.createElement('span'); nk.className = 'nick'; nk.textContent = row.nickname; // XSS 방어: textContent
                const sc = document.createElement('span'); sc.className = 'sc'; sc.textContent = Number(row.score).toLocaleString();
                li.append(rk, nk, sc);
                listEl.appendChild(li);
            });
        }

        function showSubmitError(msg) {
            lbErrorEl.textContent = msg;
            lbErrorEl.hidden = false;
        }
        function clearSubmitError() {
            lbErrorEl.hidden = true;
            lbErrorEl.textContent = '';
        }

        async function handleSubmitScore() {
            const nickname = (nicknameInput.value || '').trim();
            if (!nickname || nickname.length > 12 || !NICK_RE.test(nickname)) {
                showSubmitError('닉네임은 한글/영문/숫자/공백/_/- 1~12자로 입력해주세요.');
                return;
            }
            const submittedKey = 'submitted_' + score;
            if (sessionStorage.getItem(submittedKey)) {
                showSubmitError('이미 제출된 점수입니다.');
                return;
            }

            submitBtn.disabled = true;
            nicknameInput.disabled = true;
            submitBtn.textContent = '제출 중...';
            clearSubmitError();
            try {
                await submitScore(nickname, score);
                localStorage.setItem('nickname', nickname);
                sessionStorage.setItem(submittedKey, '1');
                submitForm.hidden = true;
                try {
                    const rows = await fetchTop(10);
                    renderLeaderboard(lbList, rows, { nickname, score });
                } catch (e) {
                    renderLeaderboard(lbList, [], null);
                    showSubmitError('점수는 제출됐지만 리더보드를 불러오지 못했습니다.');
                }
                lbSection.hidden = false;
            } catch (e) {
                showSubmitError('점수 제출 실패: 네트워크 또는 서버 오류. 잠시 후 다시 시도해주세요.');
            } finally {
                submitBtn.disabled = false;
                nicknameInput.disabled = false;
                submitBtn.textContent = '점수 제출';
            }
        }

        function showGameOverModal() {
            finalScoreDisplay.innerText = score;
            submitForm.hidden = false;
            lbSection.hidden = true;
            clearSubmitError();
            nicknameInput.value = localStorage.getItem('nickname') || '';
            nicknameInput.disabled = false;
            submitBtn.disabled = false;
            submitBtn.textContent = '점수 제출';
            gameOverOverlay.classList.add('show');
            // 1F: 닉네임 입력에 포커스 (모바일에선 키보드 자동 노출 방지 위해 미세 지연)
            setTimeout(() => nicknameInput.focus({ preventScroll: true }), 50);
        }

        // 🏆 랭킹 버튼: 게임 중에도 리더보드 보기
        rankingBtn.addEventListener('click', async () => {
            lbOverlay.classList.add('show');
            lbOnlyList.innerHTML = '<li>불러오는 중...</li>';
            try {
                const rows = await fetchTop(10);
                renderLeaderboard(lbOnlyList, rows, null);
            } catch (e) {
                lbOnlyList.innerHTML = '<li>리더보드를 불러오지 못했습니다.</li>';
            }
        });
        lbCloseBtn.addEventListener('click', () => lbOverlay.classList.remove('show'));
        lbOverlay.addEventListener('click', e => {
            if (e.target === lbOverlay) lbOverlay.classList.remove('show');
        });

        // ============================
        // PWA 설치 + Service Worker
        // ============================
        const installBtn = document.getElementById('install-btn');
        let deferredPrompt = null;

        const isStandalone = window.matchMedia('(display-mode: standalone)').matches
            || window.navigator.standalone === true;

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            if (!isStandalone) installBtn.hidden = false;
        });

        installBtn.addEventListener('click', async () => {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            try {
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') installBtn.hidden = true;
            } catch (_) { /* noop */ }
            deferredPrompt = null;
        });

        window.addEventListener('appinstalled', () => {
            installBtn.hidden = true;
            deferredPrompt = null;
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(() => {
                    // 로컬 file:// 환경 등 SW 미지원이어도 게임은 정상 동작
                });
            });
        }

        init();
    </script>
</body>
